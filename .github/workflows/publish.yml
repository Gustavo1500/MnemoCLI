name: Publish to PyPI

on:
  push:
    tags:
      - '*'           # ← runs on every tag push (v1.0.0, 1.2.3, etc.)
      # or: - 'v*.*.*'  # if you prefer semantic version tags only

  # Optional: also allow manual trigger for testing
  workflow_dispatch:

jobs:
  build-n-publish:
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      id-token: write     # Required for Trusted Publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # These are optional in trusted mode, but good to be explicit
          repository-url: https://upload.pypi.org/legacy/
          skip-existing: true           # Don't fail if version already exists
          verbose: true                 # Helpful for debugging first runs
